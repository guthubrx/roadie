<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Le dégradé signature de votre identité visuelle -->
    <linearGradient id="bgGradientCommon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6FABF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>

    <!-- Masque pour découper le "R" au bas de la fenêtre principale -->
    <mask id="rMask">
      <!-- Rectangle blanc de base (affiche toute la fenêtre) -->
      <rect x="160" y="65" width="180" height="380" rx="12" ry="12" fill="white" />
      
      <!-- Le "R" dessiné en noir pour créer le trou (transparence) -->
      <g transform="translate(190, 280) scale(1.3)" fill="black" fill-rule="evenodd">
        
        <!-- BLOC 1 : La barre verticale (fût) continue de haut en bas ET la boucle du 'P' -->
        <!-- La ligne descend maintenant jusqu'à V 100 sans interruption -->
        <path d="M 12 0 
                 H 50 
                 C 75 0, 90 15, 90 30 
                 C 90 45, 75 60, 50 60 
                 H 28 
                 V 100 
                 H 12 
                 C 4 100, 0 96, 0 88 
                 V 12 
                 C 0 4, 4 0, 12 0 
                 Z 
                 M 28 20 
                 V 40 
                 H 48 
                 C 58 40, 65 35, 65 30 
                 C 65 25, 58 20, 48 20 
                 Z" />

        <!-- BLOC 2 : La queue oblique (jambe) -->
        <!-- Marge réduite de ~15% vs version d'origine (y=68 → y=66.8) :
             rapproche la jambe du bas de la boucle (y=60), jambe géométriquement
             un peu plus longue. -->
        <path d="M 40 66.8
                 H 68
                 L 93 100
                 H 65
                 Z" />
      </g>
    </mask>
  </defs>

  <!-- 1. Le Fond -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGradientCommon)" />

  <!-- 2. Stage Manager (À gauche, en perspective 45°) -->
  <g fill="white" transform="translate(70, 135) scale(0.7, 0.85) skewY(-20)">
    <!-- Groupe du haut (Pile de 3) -->
    <rect x="-30" y="-30" width="100" height="150" rx="12" ry="12" fill-opacity="0.2" />
    <rect x="-15" y="-15" width="100" height="150" rx="12" ry="12" fill-opacity="0.5" />
    <rect x="0" y="0" width="100" height="150" rx="12" ry="12" fill-opacity="0.8" />
    
    <!-- Groupe du bas (Pile de 2) -->
    <rect x="-15" y="175" width="100" height="150" rx="12" ry="12" fill-opacity="0.5" />
    <rect x="0" y="190" width="100" height="150" rx="12" ry="12" fill-opacity="0.8" />
  </g>

  <!-- 3. Tiling Window Manager (Mosaïque centrale et droite) -->
  <g>
    <!-- === FENÊTRE PRINCIPALE (Avec le R percé en bas) === -->
    <rect x="160" y="65" width="180" height="380" rx="12" ry="12" fill="white" fill-opacity="0.95" stroke="#2563AB" stroke-width="2" mask="url(#rMask)" />
    
    <!-- Les 3 petits points sur la fenêtre principale -->
    <circle cx="175" cy="85" r="4" fill="#4A90E2" fill-opacity="0.8"/>
    <circle cx="190" cy="85" r="4" fill="#4A90E2" fill-opacity="0.5"/>
    <circle cx="205" cy="85" r="4" fill="#4A90E2" fill-opacity="0.3"/>
    
    <!-- === FENÊTRE SECONDAIRE HAUT === -->
    <rect x="360" y="65" width="90" height="180" rx="12" ry="12" fill="white" fill-opacity="0.7" />
    <!-- Les 3 petits points -->
    <circle cx="375" cy="85" r="4" fill="#4A90E2" fill-opacity="0.8"/>
    <circle cx="390" cy="85" r="4" fill="#4A90E2" fill-opacity="0.5"/>
    <circle cx="405" cy="85" r="4" fill="#4A90E2" fill-opacity="0.3"/>

    <!-- === FENÊTRE SECONDAIRE BAS === -->
    <rect x="360" y="265" width="90" height="180" rx="12" ry="12" fill="white" fill-opacity="0.4" />
    <!-- Les 3 petits points -->
    <circle cx="375" cy="285" r="4" fill="#4A90E2" fill-opacity="0.8"/>
    <circle cx="390" cy="285" r="4" fill="#4A90E2" fill-opacity="0.5"/>
    <circle cx="405" cy="285" r="4" fill="#4A90E2" fill-opacity="0.3"/>
  </g>

</svg>
