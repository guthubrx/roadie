<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6FABF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    <mask id="rMaskSP">
      <rect x="160" y="65" width="180" height="380" rx="12" ry="12" fill="white" />
      <g transform="translate(190, 280) scale(1.3)" fill="black" fill-rule="evenodd">
        <path d="M 12 0 H 50 C 75 0, 90 15, 90 30 C 90 45, 75 60, 50 60 H 28 V 100 H 12 C 4 100, 0 96, 0 88 V 12 C 0 4, 4 0, 12 0 Z M 28 20 V 40 H 48 C 58 40, 65 35, 65 30 C 65 25, 58 20, 48 20 Z" />
        <path d="M 40 66.8 H 68 L 93 100 H 65 Z" />
      </g>
    </mask>
  </defs>

  <!-- Fond sombre -->
  <rect x="0" y="0" width="1280" height="640" fill="url(#bgGrad)" />

  <!-- Logo à gauche, centré verticalement, taille 380x380 -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="380" height="380" rx="82" ry="82" fill="url(#logoBgGradient)" />
    <g transform="scale(0.7421875)">
      <!-- Stage Manager (translate adapté à scale 0.74) -->
      <g fill="white" transform="translate(70, 135) scale(0.7, 0.85) skewY(-20)">
        <rect x="-30" y="-30" width="100" height="150" rx="12" ry="12" fill-opacity="0.2" />
        <rect x="-15" y="-15" width="100" height="150" rx="12" ry="12" fill-opacity="0.5" />
        <rect x="0" y="0" width="100" height="150" rx="12" ry="12" fill-opacity="0.8" />
        <rect x="-15" y="175" width="100" height="150" rx="12" ry="12" fill-opacity="0.5" />
        <rect x="0" y="190" width="100" height="150" rx="12" ry="12" fill-opacity="0.8" />
      </g>
      <!-- Tiling -->
      <g>
        <rect x="160" y="65" width="180" height="380" rx="12" ry="12" fill="white" fill-opacity="0.95" stroke="#2563AB" stroke-width="2" mask="url(#rMaskSP)" />
        <circle cx="175" cy="85" r="4" fill="#4A90E2" fill-opacity="0.8"/>
        <circle cx="190" cy="85" r="4" fill="#4A90E2" fill-opacity="0.5"/>
        <circle cx="205" cy="85" r="4" fill="#4A90E2" fill-opacity="0.3"/>
        <rect x="360" y="65" width="90" height="180" rx="12" ry="12" fill="white" fill-opacity="0.7" />
        <circle cx="375" cy="85" r="4" fill="#4A90E2" fill-opacity="0.8"/>
        <circle cx="390" cy="85" r="4" fill="#4A90E2" fill-opacity="0.5"/>
        <circle cx="405" cy="85" r="4" fill="#4A90E2" fill-opacity="0.3"/>
        <rect x="360" y="265" width="90" height="180" rx="12" ry="12" fill="white" fill-opacity="0.4" />
        <circle cx="375" cy="285" r="4" fill="#4A90E2" fill-opacity="0.8"/>
        <circle cx="390" cy="285" r="4" fill="#4A90E2" fill-opacity="0.5"/>
        <circle cx="405" cy="285" r="4" fill="#4A90E2" fill-opacity="0.3"/>
      </g>
    </g>
  </g>

  <!-- Texte à droite -->
  <g transform="translate(540, 230)" fill="#E8EEF8">
    <text x="0" y="0" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="120" font-weight="700" letter-spacing="-3">roadie</text>
    <text x="0" y="60" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="32" font-weight="400" fill="#7AA2F7">tiling window manager for macOS</text>
    <text x="0" y="130" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#A8B2C7">BSP tiling · Stage Manager · virtual desktops · multi-display</text>
  </g>
</svg>
